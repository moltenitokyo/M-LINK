<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molteni & C | Central Hub</title>
    <style>
        /* フォントの読み込み（Bodoniに近いGoogle Fontを使用。お持ちのフォントファイルがある場合は差し替え可能です） */
        @import url('https://fonts.googleapis.com/css2?family=Libre+Bodoni:wght@400;500&display=swap');

        :root {
            --bg-color: #E2E2E2;
            --text-color: #37393b;
            --font-main: "Bodoni W01 Roman", "Libre Bodoni", "Bodoni MT", "serif";
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* iPhoneのセーフエリア対応 */
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            width: 85%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 80vh;
        }

        /* ブランドロゴ部分 */
        .brand-name {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 0.05em;
            margin-bottom: 60px;
            /* Molteni&Cのロゴに寄せる場合はこちらを調整 */
        }

        /* リンクナビゲーション */
        nav {
            display: flex;
            flex-direction: column;
            gap: 25px; /* ボタン間の余白 */
        }

        .link-item {
            text-decoration: none;
            color: var(--text-color);
            font-size: 18px;
            letter-spacing: 0.02em;
            transition: opacity 0.4s ease;
            /* タップエリアを確保（枠線は見えないが、押しやすくする） */
            padding: 10px 0;
            display: block;
        }

        /* タップした時のフィードバック */
        .link-item:active {
            opacity: 0.4;
        }

        /* PCでの閲覧時のみホバー効果 */
        @media (hover: hover) {
            .link-item:hover {
                opacity: 0.5;
            }
        }

        /* フッター（コピーライトなど） */
        .footer {
            margin-top: 80px;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="brand-name">Molteni&C</h1>

        <nav>
            <!-- リンク先（href）を実際のURLに書き換えてください -->
            <a href="https://palazzo-molteni-floormap-tour.vercel.app/" class="link-item">Store Tour</a>
            <a href="https://www.molteni.it/jp/category/news#" class="link-item">New Collection</a>
            <a href="https://molteni.it/jp/landing/geometry-of-life" class="link-item">Geometry of Life</a>
            <a href="https://www.instagram.com/molteniandc/" class="link-item">Instagram</a>
            <a href="https://www.molteni.it/store/tokyo-flagship-store/jp/#open-contact-form" class="link-item">Contact</a>
        </nav>

        <div class="footer">
            &copy; 2026 Molteni&C
        </div>
    </div>

</body>
</html>
