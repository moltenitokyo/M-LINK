<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molteni & C | Central Hub</title>
    <style>
        /* Bodoniフォントの読み込み */
        @import url('https://fonts.googleapis.com/css2?family=Libre+Bodoni:wght@400;500&display=swap');

        :root {
            --bg-color: #E2E2E2;
            --text-color: #37393b;
            --font-main: "Bodoni W01 Roman", "Libre Bodoni", "Bodoni MT", "serif";
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            width: 85%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 85vh;
        }

        /* ブランドロゴ */
        .brand-name {
            font-size: 30px;
            font-weight: 400;
            letter-spacing: 0.05em;
            margin-bottom: 80px;
        }

        /* リンクナビゲーション */
        nav {
            display: flex;
            flex-direction: column;
            gap: 35px; /* 指定の通り広めの行間 */
        }

        .link-item {
            text-decoration: none;
            color: var(--text-color);
            font-size: 14px; /* 指定の通り小さめに設定 */
            letter-spacing: 0.08em;
            transition: opacity 0.4s ease;
            padding: 5px 0;
            display: block;
        }

        /* タップフィードバック */
        .link-item:active {
            opacity: 0.3;
        }

        @media (hover: hover) {
            .link-item:hover {
                opacity: 0.5;
            }
        }

        /* フッター */
        .footer {
            margin-top: 100px;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="brand-name">Molteni&C</h1>

        <nav>
            <!-- ご指定のURLと文言、すべて新しいタブで開く設定 -->
            <a href="https://palazzo-molteni-floormap-tour.vercel.app/" class="link-item" target="_blank" rel="noopener noreferrer">Store Tour</a>
            <a href="https://www.molteni.it/jp/category/news#" class="link-item" target="_blank" rel="noopener noreferrer">New Collection</a>
            <a href="https://molteni.it/jp/landing/geometry-of-life" class="link-item" target="_blank" rel="noopener noreferrer">Geometry of Life</a>
            <a href="https://www.instagram.com/molteniandc/" class="link-item" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a href="https://www.molteni.it/store/tokyo-flagship-store/jp/#open-contact-form" class="link-item" target="_blank" rel="noopener noreferrer">Contact</a>
        </nav>

        <div class="footer">
            &copy; 2026 Molteni&C
        </div>
    </div>

</body>
</html>
