<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <title>Molteni & C</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Bodoni:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap');

        :root {
            --bg-color: #E2E2E2;
            --text-color: #000000;
            --font-h2: "Bodoni W01 Roman", "Libre Bodoni", "Bodoni MT", serif;
            --font-default: "Zen Kaku Gothic New", "Helvetica Neue", Arial, sans-serif;
            --side-padding: 30px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-default);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* --- イントロ演出 --- */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #FFFFFF;
            z-index: 9999;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 1.2s ease-in-out;
        }

        .swarm-img {
            position: absolute;
            opacity: 0;
            width: 75%;
            max-width: 400px;
            pointer-events: none;
            will-change: opacity, transform; /* 動作を滑らかにするおまじない */
        }

        /* アニメーション開始用のクラス（JSで付与） */
        .start-anim .img1  { top: -5%; left: -10%; animation: swarmAct 1.8s ease-in-out 0.1s; }
        .start-anim .img2  { bottom: -5%; right: -5%; animation: swarmAct 1.8s ease-in-out 0.2s; }
        .start-anim .img3  { top: 20%; right: -15%; animation: swarmAct 1.8s ease-in-out 0.3s; }
        .start-anim .img4  { bottom: 15%; left: -10%; animation: swarmAct 1.8s ease-in-out 0.4s; }
        .start-anim .img5  { top: 10%; right: 10%; animation: swarmAct 1.8s ease-in-out 0.5s; }
        .start-anim .img6  { top: 40%; left: 5%; animation: swarmAct 1.8s ease-in-out 0.6s; }
        .start-anim .img7  { bottom: 30%; right: 0%; animation: swarmAct 1.8s ease-in-out 0.7s; }
        .start-anim .img8  { top: -10%; right: 5%; animation: swarmAct 1.8s ease-in-out 0.8s; }
        .start-anim .img9  { bottom: -10%; left: 20%; animation: swarmAct 1.8s ease-in-out 0.9s; }
        .start-anim .img10 { top: 25%; left: -5%; animation: swarmAct 1.8s ease-in-out 1.0s; }
        .start-anim .img11 { bottom: 0%; right: -10%; animation: swarmAct 1.8s ease-in-out 1.1s; }
        .start-anim .img12 { top: 50%; right: -5%; animation: swarmAct 1.8s ease-in-out 1.2s; }
        .start-anim .img13 { top: 0%; left: 10%; animation: swarmAct 1.8s ease-in-out 1.3s; }
        .start-anim .img14 { bottom: 20%; right: 15%; animation: swarmAct 1.8s ease-in-out 1.4s; }
        .start-anim .img15 { top: 15%; left: 2%; animation: swarmAct 2.0s ease-in-out 1.5s; }

        @keyframes swarmAct {
            0% { opacity: 0; transform: scale(1.05); filter: blur(10px); }
            30% { opacity: 0.8; filter: blur(0); }
            85% { opacity: 0.8; }
            100% { opacity: 0; transform: scale(1); }
        }

        .intro-logo-box { position: relative; z-index: 10000; width: 140px; text-align: center; }
        .intro-logo-img { width: 100%; height: auto; opacity: 0; }
        .start-anim .intro-logo-img { animation: logoFade 2.5s ease-in-out 2.5s forwards; }

        @keyframes logoFade {
            0% { opacity: 0; filter: blur(5px); transform: scale(0.95); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        #intro-overlay.fade-out { opacity: 0; pointer-events: none; }

        /* --- メインハブ --- */
        .wrapper { padding: 40px var(--side-padding); }
        .brand-logo-img { width: 150px; margin-bottom: 25px; display: block; }
        section { margin-bottom: 3px; width: 100%; }
        h2 { font-family: var(--font-h2); font-size: 20px; text-transform: uppercase; cursor: pointer; margin: 0; padding: 5px 0; }
        .content { max-height: 0; overflow: hidden; transition: max-height 0.4s; padding-left: 5px; opacity: 0; }
        section.open > .content { max-height: 5000px; opacity: 1; margin-top: 5px; }
        .intro-text { font-size: 13px; line-height: 1.8; margin-bottom: 20px; }
        .video-trigger { font-size: 15px; margin: 8px 0; cursor: pointer; display: block; }
        .video-wrapper { max-height: 0; overflow: hidden; transition: max-height 0.5s; padding-left: 10px; }
        .video-wrapper.show { max-height: 1000px; }
        .video-container { padding-bottom: 56.25%; position: relative; background: #000; margin: 10px 0; }
        .video-container iframe { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; }
        .link-item { text-decoration: none; color: #000; font-size: 15px; display: block; padding: 5px 0; }
        .info-link { border-bottom: 0.5px solid rgba(0,0,0,0.3); text-decoration: none; }
        .gap-large { margin-bottom: 25px; }
        .footer { margin-top: 50px; font-size: 8px; opacity: 0.4; }
    </style>
</head>
<body>

    <!-- イントロ：ここをクリックすればいつでもスキップ可能 -->
    <div id="intro-overlay" onclick="enterSite()">
        <img src="swarm1.jpg" class="swarm-img img1">
        <img src="swarm2.jpg" class="swarm-img img2">
        <img src="swarm3.jpg" class="swarm-img img3">
        <img src="swarm4.jpg" class="swarm-img img4">
        <img src="swarm5.jpg" class="swarm-img img5">
        <img src="swarm6.jpg" class="swarm-img img6">
        <img src="swarm7.jpg" class="swarm-img img7">
        <img src="swarm8.jpg" class="swarm-img img8">
        <img src="swarm9.jpg" class="swarm-img img9">
        <img src="swarm10.jpg" class="swarm-img img10">
        <img src="swarm11.jpg" class="swarm-img img11">
        <img src="swarm12.jpg" class="swarm-img img12">
        <img src="swarm13.jpg" class="swarm-img img13">
        <img src="swarm14.jpg" class="swarm-img img14">
        <img src="swarm15.jpg" class="swarm-img img15">
        <div class="intro-logo-box">
            <img src="logo.png" class="intro-logo-img">
        </div>
    </div>

    <div class="wrapper">
        <img src="logo.png" class="brand-logo-img">

        <section class="open">
            <h2>WHAT'S NEW</h2>
            <div class="content">
                <a href="https://saas.actibookone.com/content/detail?param=eyJjb250ZW50TnVtIjo3MTQ3MzN9&detailFlg=0&pNo=1" class="link-item" target="_blank">新製品カタログ 2026</a>
                <a href="https://molteni.it/jp/landing/geometry-of-life" class="link-item" target="_blank">ブランドムービー「Geometry of Life」</a>
            </div>
        </section>

        <section>
            <h2 onclick="toggle(this)">IDENTITY</h2>
            <div class="content">
                <img src="identity.jpg" class="archive-img" style="width:100%; height:auto; margin-bottom:15px;">
                <div class="intro-text">
                    1934年の創業以来、卓越した品質への飽くなきこだわりを持ち続けています。
                </div>
                <span class="video-trigger" onclick="toggleVideo(this, '1107963555')">【ムービー】ブランドの歴史</span>
                <div class="video-wrapper"><div class="video-container"></div></div>
            </div>
        </section>

        <section class="gap-large">
            <h2 onclick="toggle(this)">STORE</h2>
            <div class="content">
                <span class="video-trigger" onclick="toggleSub(this)">Palazzo Molteni Tokyo</span>
                <div class="video-wrapper">
                    <a href="https://palazzo-molteni-floormap-tour.vercel.app/" class="link-item" target="_blank">フロアツアー</a>
                </div>
            </div>
        </section>

        <div class="footer">&copy; Copyright © ARFLEX JAPAN LTD. All rights reserved.</div>
    </div>

    <script>
        // 1. アニメーションを強制的に開始させる設定
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('intro-overlay').classList.add('start-anim');
            }, 300); // 0.3秒後に開始
        });

        // 2. サイトへの入室
        function enterSite() {
            const overlay = document.getElementById('intro-overlay');
            overlay.classList.add('fade-out');
            setTimeout(() => { overlay.style.display = 'none'; }, 1000);
        }

        // 3. 基本的な開閉ロジック
        function toggle(element) { element.parentElement.classList.toggle('open'); }
        function toggleSub(element) {
            const nextEl = element.nextElementSibling;
            if (nextEl) {
                const isOpen = nextEl.classList.contains('show');
                nextEl.classList.toggle('show');
                nextEl.style.maxHeight = isOpen ? '0px' : '1000px';
            }
        }
        function toggleVideo(element, vimeoId) {
            const wrapper = element.nextElementSibling;
            const container = wrapper.querySelector('.video-container');
            if (!container.innerHTML.trim()) {
                container.innerHTML = `<iframe src="https://player.vimeo.com/video/${vimeoId}?autoplay=1&title=0&byline=0&portrait=0&color=ffffff" allowfullscreen></iframe>`;
            }
            const isOpen = wrapper.classList.contains('show');
            wrapper.classList.toggle('show');
            wrapper.style.maxHeight = isOpen ? '0px' : '1000px';
        }
    </script>
</body>
</html>
